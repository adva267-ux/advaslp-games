<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בנה פרצוף 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #FFF6E9;
  --card:    #FFFFFF;
  --border:  #F0E4D4;
  --text:    #3D2C1E;
  --muted:   #B89B80;
  --accent:  #FF8C61;
  --accent2: #A78BFA;
  --skin:    #FDDBB4;
  --skin-s:  #F5BC82;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Baloo 2', cursive;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 8% 12%,  #FFECD855 0%, transparent 40%),
    radial-gradient(ellipse at 92% 88%, #E4D4FF44 0%, transparent 38%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 12px 48px;
  color: var(--text);
}

.header { text-align: center; margin-bottom: 24px; }
h1 {
  font-size: 2.4rem; font-weight: 800;
  background: linear-gradient(135deg, #FF8C61, #A78BFA);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.subtitle { font-size: 0.88rem; color: var(--muted); font-weight: 600; }

.game-container {
  display: flex; gap: 24px; align-items: flex-start;
  width: 100%; max-width: 940px; flex-wrap: wrap; justify-content: center;
}

.face-wrapper { display: flex; flex-direction: column; align-items: center; gap: 14px; }

#faceContainer { position: relative; width: 280px; height: 330px; cursor: default; }
#faceContainer.drag-over #faceSvg { filter: drop-shadow(0 0 20px #A78BFA88); transition: filter 0.2s; }
#faceSvg { display: block; overflow: visible; }

.drop-hint { opacity: 0; transition: opacity 0.25s; pointer-events: none; }
#faceContainer.drag-over .drop-hint { opacity: 1; }

.drag-ghost {
  position: fixed; pointer-events: none; opacity: 0.82;
  transform: translate(-50%,-50%) scale(1.06); z-index: 9999;
  filter: drop-shadow(0 6px 14px rgba(100,60,180,0.3));
}

.emotion-tag {
  font-size: 1rem; font-weight: 700; color: var(--text);
  background: var(--card); padding: 7px 22px; border-radius: 50px;
  box-shadow: 0 3px 14px rgba(180,130,80,0.14); border: 2.5px solid var(--border);
  min-width: 170px; text-align: center; transition: all 0.3s;
}

.btn-reset {
  background: linear-gradient(135deg, #FF8C61, #F97316);
  color: white; border: none; padding: 9px 28px; border-radius: 50px;
  font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 0.95rem;
  cursor: pointer; box-shadow: 0 4px 0 #C45A20, 0 6px 16px #F9731640;
  transition: all 0.15s;
}
.btn-reset:hover  { transform: translateY(-2px); }
.btn-reset:active { transform: translateY(3px); box-shadow: 0 1px 0 #C45A20; }

.controls-panel {
  display: flex; flex-direction: column; gap: 14px;
  flex: 1; min-width: 300px; max-width: 560px;
}

.category-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  background: var(--card); border: 2.5px solid var(--border);
  border-radius: 50px; padding: 7px 16px;
  font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 0.86rem;
  cursor: pointer; transition: all 0.18s; color: var(--muted);
}
.tab-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
.tab-btn.active {
  background: linear-gradient(135deg, #FF8C61, #F97316);
  color: white; border-color: transparent;
  box-shadow: 0 4px 0 #C45A20, 0 6px 14px #F9731640; transform: translateY(-2px);
}

.options-container {
  background: var(--card); border-radius: 28px; padding: 20px 18px 16px;
  box-shadow: 0 6px 28px rgba(180,130,80,0.1); border: 2.5px solid var(--border);
}
.options-title { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 14px; }
.options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }

.option-card {
  background: #FFFAF5; border: 2.5px solid var(--border); border-radius: 20px;
  padding: 10px 8px 9px; cursor: grab;
  transition: all 0.2s cubic-bezier(0.34,1.5,0.64,1);
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  user-select: none;
}
.option-card:hover  { border-color: var(--accent); transform: translateY(-5px) scale(1.03); box-shadow: 0 10px 22px #FF8C6130; }
.option-card.selected { border-color: var(--accent2); background: #F5F0FF; box-shadow: 0 0 0 3px #A78BFA30; transform: translateY(-4px); }
.option-card:active { cursor: grabbing; }

.option-card[data-cat="eyes"]     .option-preview { background: #FFE8D4; }
.option-card[data-cat="eyebrows"] .option-preview { background: #EDE6FF; }
.option-card[data-cat="nose"]     .option-preview { background: #FFF4CC; }
.option-card[data-cat="mouth"]    .option-preview { background: #FFE0EA; }
.option-card[data-cat="ears"]     .option-preview { background: #D4F5E8; }
.option-card[data-cat="accessories"] .option-preview { background: #FFF0CC; }

.option-preview {
  width: 94px; height: 56px; display: flex; align-items: center; justify-content: center;
  border-radius: 14px; overflow: hidden; padding: 4px;
}
.option-preview svg { width: 100%; height: 100%; }

.option-label { font-size: 0.73rem; font-weight: 700; color: var(--muted); text-align: center; line-height: 1.25; }
.option-card.selected .option-label { color: var(--accent2); }
.drag-hint { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 10px; font-weight: 600; }

/* ── SPEAK BUTTON ── */
.btn-speak {
  background: linear-gradient(135deg, #A78BFA, #7C5CF5);
  color: white; border: none; padding: 9px 28px; border-radius: 50px;
  font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 0.95rem;
  cursor: pointer; box-shadow: 0 4px 0 #5A3DC8, 0 6px 16px #A78BFA40;
  transition: all 0.15s; display: flex; align-items: center; gap: 8px;
}
.btn-speak:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 #5A3DC8, 0 8px 20px #A78BFA50; }
.btn-speak:active { transform: translateY(3px); box-shadow: 0 1px 0 #5A3DC8; }
.btn-speak:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-speak .speak-icon { font-size: 1.1rem; transition: transform 0.3s; }
.btn-speak.speaking .speak-icon { animation: speakPulse 0.6s ease-in-out infinite alternate; }
@keyframes speakPulse { from { transform: scale(1); } to { transform: scale(1.3); } }

.face-buttons { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>

<div class="header">
  <h1>🎨 בנה פרצוף!</h1>
  <p class="subtitle">גרור חלקים לתוך הפנים, או לחץ עליהם לבחירה</p>
</div>

<div class="game-container">
  <div class="face-wrapper">
    <div id="faceContainer">
      <!--
        Face SVG: 280 × 330
        Face ellipse: cx=140 cy=172 rx=118 ry=136

        Part absolute positions (designed to sit perfectly on face):
          Ears L:   x≈10,  y≈128  (behind face)
          Ears R:   x≈242, y≈128
          Eyebrows: centered at y≈94,  span x≈38–242
          Eyes:     centered at y≈128, eye L cx≈88, eye R cx≈192
          Nose:     centered at x≈140, y≈178
          Mouth:    centered at x≈140, y≈238
      -->
      <svg id="faceSvg" width="280" height="330" viewBox="0 0 280 330" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="fShadow" x="-15%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#D49060" flood-opacity="0.2"/>
          </filter>
          <!-- Eyes: normal -->
          <clipPath id="f_cl"><ellipse cx="88"  cy="128" rx="25" ry="18"/></clipPath>
          <clipPath id="f_cr"><ellipse cx="192" cy="128" rx="25" ry="18"/></clipPath>
          <radialGradient id="f_irisNorm" cx="40%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#6B8EC4"/>
            <stop offset="55%"  stop-color="#3A5A8C"/>
            <stop offset="100%" stop-color="#1A2A4A"/>
          </radialGradient>
          <!-- Eyes: sad -->
          <clipPath id="f_sdl"><ellipse cx="88"  cy="130" rx="24" ry="17"/></clipPath>
          <clipPath id="f_sdr"><ellipse cx="192" cy="130" rx="24" ry="17"/></clipPath>
          <radialGradient id="f_irisSad" cx="40%" cy="40%" r="60%">
            <stop offset="0%"   stop-color="#7AAAD4"/>
            <stop offset="60%"  stop-color="#4A7AAA"/>
            <stop offset="100%" stop-color="#1E3A5A"/>
          </radialGradient>
          <!-- Eyes: angry -->
          <clipPath id="f_agl"><ellipse cx="88"  cy="130" rx="24" ry="16"/></clipPath>
          <clipPath id="f_agr"><ellipse cx="192" cy="130" rx="24" ry="16"/></clipPath>
          <radialGradient id="f_irisAngry" cx="40%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#CC4455"/>
            <stop offset="55%"  stop-color="#882233"/>
            <stop offset="100%" stop-color="#440011"/>
          </radialGradient>
          <!-- Eyes: surprised -->
          <clipPath id="f_supl"><circle cx="88"  cy="128" r="26"/></clipPath>
          <clipPath id="f_supr"><circle cx="192" cy="128" r="26"/></clipPath>
          <radialGradient id="f_irisSup" cx="40%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#5A8AD4"/>
            <stop offset="55%"  stop-color="#2A4A8C"/>
            <stop offset="100%" stop-color="#0A1A4A"/>
          </radialGradient>
          <!-- Eyes: wink -->
          <clipPath id="f_wkl"><ellipse cx="88" cy="128" rx="25" ry="18"/></clipPath>
          <!-- Eyes: sleepy -->
          <clipPath id="f_sll"><ellipse cx="88"  cy="133" rx="25" ry="11"/></clipPath>
          <clipPath id="f_slr"><ellipse cx="192" cy="133" rx="25" ry="11"/></clipPath>
          <!-- Eyes: stars glow -->
          <radialGradient id="f_starGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFEE44" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#FFAA00" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Ears (rendered behind face) -->
        <g id="gEarLeft"></g>
        <g id="gEarRight"></g>

        <!-- Face base -->
        <ellipse cx="140" cy="172" rx="118" ry="136" fill="#FDDBB4" filter="url(#fShadow)"/>
        <ellipse cx="140" cy="172" rx="118" ry="136" fill="none" stroke="#3D2C1E" stroke-width="3.5"/>

        <!-- Forehead shine -->
        <ellipse cx="116" cy="100" rx="30" ry="18" fill="white" opacity="0.22"/>

        <!-- Cheek blush -->
        <ellipse cx="52"  cy="216" rx="28" ry="17" fill="#FF9E7A" opacity="0.26"/>
        <ellipse cx="228" cy="216" rx="28" ry="17" fill="#FF9E7A" opacity="0.26"/>

        <!-- Empty zone hints -->
        <g id="emptyHints">
          <rect x="38"  y="80"  width="204" height="26" rx="13" fill="#E8E0FF" opacity="0.55"/>
          <text x="140" y="97"  text-anchor="middle" font-family="Baloo 2,cursive" font-size="10" font-weight="700" fill="#8B6FD4">גבות</text>
          <rect x="38"  y="108" width="204" height="46" rx="16" fill="#FFD6B0" opacity="0.5"/>
          <text x="140" y="136" text-anchor="middle" font-family="Baloo 2,cursive" font-size="10" font-weight="700" fill="#D07030">עיניים</text>
          <rect x="108" y="158" width="64"  height="54" rx="16" fill="#FFF0C0" opacity="0.6"/>
          <text x="140" y="189" text-anchor="middle" font-family="Baloo 2,cursive" font-size="10" font-weight="700" fill="#B08010">אף</text>
          <rect x="60"  y="216" width="160" height="58" rx="18" fill="#FFD0DF" opacity="0.55"/>
          <text x="140" y="250" text-anchor="middle" font-family="Baloo 2,cursive" font-size="10" font-weight="700" fill="#C0305A">פה</text>
          <rect x="8"   y="116" width="28"  height="68" rx="12" fill="#C0F0DE" opacity="0.65"/>
          <rect x="244" y="116" width="28"  height="68" rx="12" fill="#C0F0DE" opacity="0.65"/>
          <text x="22"  y="154" text-anchor="middle" font-family="Baloo 2,cursive" font-size="8" font-weight="700" fill="#2A8060">אוזן</text>
          <text x="258" y="154" text-anchor="middle" font-family="Baloo 2,cursive" font-size="8" font-weight="700" fill="#2A8060">אוזן</text>
        </g>

        <!-- Drag-over glow -->
        <g class="drop-hint">
          <rect x="38"  y="80"  width="204" height="26" rx="13" fill="#A78BFA" opacity="0.15"/>
          <rect x="38"  y="108" width="204" height="46" rx="16" fill="#FF8C61" opacity="0.12"/>
          <rect x="108" y="158" width="64"  height="54" rx="16" fill="#FFD700" opacity="0.14"/>
          <rect x="60"  y="216" width="160" height="58" rx="18" fill="#FF8C61" opacity="0.12"/>
        </g>

        <!-- Face parts (rendered in ABSOLUTE face coordinates) -->
        <g id="gEyebrows"></g>
        <g id="gEyes"></g>
        <g id="gNose"></g>
        <g id="gMouth"></g>
        <!-- Accessories (on top) -->
        <g id="gGlasses"></g>
        <g id="gMustache"></g>
        <g id="gHat"></g>
      </svg>
    </div>
    <div class="emotion-tag" id="emotionTag">🙂 גרור פריטים לפנים!</div>
    <div class="face-buttons">
      <button class="btn-speak" id="btnSpeak" onclick="speakFace()" disabled>
        <span class="speak-icon">🔊</span> הקרא פרצוף
      </button>
      <button class="btn-reset" onclick="resetFace()">🔄 אפס</button>
    </div>
  </div>

  <div class="controls-panel">
    <div class="category-tabs">
      <button class="tab-btn active" onclick="selectCategory('eyes')"     id="tab-eyes">👁️ עיניים</button>
      <button class="tab-btn"        onclick="selectCategory('eyebrows')" id="tab-eyebrows">〰️ גבות</button>
      <button class="tab-btn"        onclick="selectCategory('nose')"     id="tab-nose">👃 אף</button>
      <button class="tab-btn"        onclick="selectCategory('mouth')"    id="tab-mouth">👄 פה</button>
      <button class="tab-btn"        onclick="selectCategory('ears')"     id="tab-ears">👂 אוזניים</button>
      <button class="tab-btn"        onclick="selectCategory('accessories')" id="tab-accessories">🎩 אביזרים</button>
    </div>
    <div class="options-container">
      <div class="options-title" id="optionsTitle">👁️ עיניים</div>
      <div class="options-grid"  id="optionsGrid"></div>
      <div class="drag-hint">✋ גרור לפנים • לחץ לבחירה</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  STRATEGY: every svgContent uses ABSOLUTE coordinates that
//  match the face SVG (0 0 280 330). No <g transform> needed.
//
//  Face reference points:
//    Face center: 140, 172
//    Eye L center: 88, 128    Eye R center: 192, 128
//    Brow L center: 88, 90    Brow R center: 192, 90
//    Nose center: 140, 183
//    Mouth center: 140, 248
//    Ear L: ~18, 150          Ear R: ~262, 150
// ═══════════════════════════════════════════════════════════════

// Preview SVGs use a simplified isolated coordinate space
// so they look good in the small card box.

const parts = {

  eyes: [
    { id:'eyes_normal', label:'רגיל', emotion:'ניטרלי',
      face:`<!-- uses f_cl f_cr f_irisNorm from main defs -->

      <ellipse cx="88"  cy="128" rx="25" ry="18" fill="#F8F4EE" stroke="#3D2C1E" stroke-width="2"/>
      <ellipse cx="192" cy="128" rx="25" ry="18" fill="#F8F4EE" stroke="#3D2C1E" stroke-width="2"/>

      <circle cx="192" cy="129" r="14" fill="url(#f_irisNorm)" clip-path="url(#f_cr)"/>
      <circle cx="192" cy="129" r="7"  fill="#0D0D0D"     clip-path="url(#cr)"/>
      <!-- catchlight -->
      <circle cx="94"  cy="122" r="4.5" fill="white" opacity="0.9"/>
      <circle cx="198" cy="122" r="4.5" fill="white" opacity="0.9"/>
      <circle cx="84"  cy="132" r="2"   fill="white" opacity="0.5"/>
      <circle cx="188" cy="132" r="2"   fill="white" opacity="0.5"/>
      <!-- upper eyelid shadow -->
      <path d="M63 118 Q88 110 113 118" fill="none" stroke="#C4956A" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>

      <!-- lashes top -->
      <path d="M63 118 Q68 113 70 116 Q73 111 76 115 Q80 109 83 114 Q87 108 90 113 Q95 109 98 114 Q103 110 106 115 Q110 112 113 117" fill="none" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>
      <path d="M167 118 Q172 113 174 116 Q177 111 180 115 Q184 109 187 114 Q191 108 194 113 Q199 109 202 114 Q207 110 210 115 Q214 112 217 117" fill="none" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>`,
      preview:`<svg viewBox="55 104 170 52" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="pcl"><ellipse cx="88"  cy="128" rx="25" ry="18"/></clipPath>
          <clipPath id="pcr"><ellipse cx="192" cy="128" rx="25" ry="18"/></clipPath>
          <radialGradient id="pig" cx="40%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#6B8EC4"/>
            <stop offset="55%"  stop-color="#3A5A8C"/>
            <stop offset="100%" stop-color="#1A2A4A"/>
          </radialGradient>
        </defs>
        <ellipse cx="88"  cy="128" rx="25" ry="18" fill="#F8F4EE" stroke="#3D2C1E" stroke-width="2"/>
        <ellipse cx="192" cy="128" rx="25" ry="18" fill="#F8F4EE" stroke="#3D2C1E" stroke-width="2"/>
        <circle cx="88"  cy="129" r="14" fill="url(#pig)" clip-path="url(#pcl)"/>
        <circle cx="88"  cy="129" r="7"  fill="#0D0D0D"   clip-path="url(#pcl)"/>
        <circle cx="192" cy="129" r="14" fill="url(#pig)" clip-path="url(#pcr)"/>
        <circle cx="192" cy="129" r="7"  fill="#0D0D0D"   clip-path="url(#pcr)"/>
        <circle cx="94"  cy="122" r="4.5" fill="white" opacity="0.9"/>
        <circle cx="198" cy="122" r="4.5" fill="white" opacity="0.9"/>
        <path d="M63 118 Q68 113 71 116 Q75 110 80 114 Q86 108 90 113 Q96 109 102 114 Q108 111 113 117" fill="none" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>
        <path d="M167 118 Q172 113 175 116 Q179 110 184 114 Q190 108 194 113 Q200 109 206 114 Q212 111 217 117" fill="none" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>
      </svg>` },

    { id:'eyes_happy', label:'שמח', emotion:'שמח',
      face:`<!-- happy/closed crescent eyes with lashes -->
      <path d="M63 128 Q88 106 113 128" fill="#FDDBB4" stroke="#3D2C1E" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M167 128 Q192 106 217 128" fill="#FDDBB4" stroke="#3D2C1E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- lash fans -->
      <line x1="70"  y1="123" x2="67"  y2="116" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>
      <line x1="80"  y1="117" x2="79"  y2="110" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>

      <line x1="174" y1="123" x2="171" y2="116" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>

      <line x1="194" y1="114" x2="195" y2="107" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>
      <line x1="204" y1="117" x2="206" y2="110" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>
      <line x1="212" y1="122" x2="216" y2="117" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>`,
      preview:`<svg viewBox="55 100 170 42" xmlns="http://www.w3.org/2000/svg">
        <path d="M63 128 Q88 106 113 128" fill="#FDDBB4" stroke="#3D2C1E" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M167 128 Q192 106 217 128" fill="#FDDBB4" stroke="#3D2C1E" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="70"  y1="123" x2="67"  y2="116" stroke="#2A1A0E" stroke-width="2" stroke-linecap="round"/>

// ── State ─────────────────────────────────────────────────────────
// accessories has sub-slots: hat, glasses, mustache — each independently toggled
const state = { eyes:null, eyebrows:null, nose:null, mouth:null, ears:null,
                hat:null, glasses:null, mustache:null };

const catMeta = {
  eyes:        { label:'👁️ עיניים',   gId:'gEyes' },
  eyebrows:    { label:'〰️ גבות',    gId:'gEyebrows' },
  nose:        { label:'👃 אף',       gId:'gNose' },
  mouth:       { label:'👄 פה',       gId:'gMouth' },
  ears:        { label:'👂 אוזניים',  gId:null },
  accessories: { label:'🎩 אביזרים', gId:null },
};
let currentCat='eyes', dragging=null, ghostEl=null;

function applyPart(cat, id) {
  try {
  const item = parts[cat]?.find(i=>i.id===id);
  if (!item) return;

  if (cat === 'ears') {
    state.ears = id;
    document.getElementById('gEarLeft').innerHTML  = item.lc;
    document.getElementById('gEarRight').innerHTML = item.rc;
  } else if (cat === 'accessories') {
    // toggle: clicking same item removes it
    const slot = item.slot; // 'hat' | 'glasses' | 'mustache'
    if (state[slot] === id) {
      // remove
      state[slot] = null;
      document.getElementById('g' + slot.charAt(0).toUpperCase() + slot.slice(1)).innerHTML = '';
    } else {
      state[slot] = id;
      document.getElementById('g' + slot.charAt(0).toUpperCase() + slot.slice(1)).innerHTML = item.face;
    }
    // update card selected states for this category
    document.querySelectorAll('.option-card[data-cat="accessories"]').forEach(c => {
      const cItem = parts.accessories?.find(i=>i.id===c.dataset.id);
      c.classList.toggle('selected', cItem && state[cItem.slot] === cItem.id);
    });
  } else {
    state[cat] = id;
    document.getElementById(catMeta[cat].gId).innerHTML = item.face;
  }

  const coreState = { eyes:state.eyes, eyebrows:state.eyebrows, nose:state.nose, mouth:state.mouth, ears:state.ears };
  if (Object.values(coreState).every(v=>v!==null))
    document.getElementById('emptyHints').style.opacity='0';
  updateEmotion();
  } catch(e) { console.error('applyPart crash:', cat, id, e.stack || e.message); alert('שגיאה: ' + e.message + '\ncat=' + cat + ' id=' + id); }
}

function updateEmotion() {
  const placed = Object.entries(state).filter(([,v])=>v!==null);
  if (!placed.length) {
    document.getElementById('emotionTag').textContent='🙂 גרור פריטים לפנים!';
    document.getElementById('btnSpeak').disabled = true;
    return;
  }
  const counts={};
  const skipSlots = new Set(['hat','glasses','mustache']);
  placed.forEach(([cat,id])=>{
    if(skipSlots.has(cat)) return;
    const arr = parts[cat];
    if(!arr) return;
    const it = arr.find(i=>i.id===id);
    if(it?.emotion) counts[it.emotion]=(counts[it.emotion]||0)+1;
  });
  const [top]=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const em={שמח:'😄',מאושר:'😁',עצוב:'😢',כועס:'😠',מופתע:'😲',ניטרלי:'😐',שובב:'😜',ישנוני:'😴',מתלהב:'🤩',רציני:'😤',עדין:'🙂',קומי:'🤪',חמוד:'🥰',אלפי:'🧝',עיוות:'😵'};
  document.getElementById('emotionTag').textContent=`${em[top[0]]||'😐'} ${top[0]}`;
  document.getElementById('btnSpeak').disabled = false;
}

// ── DESCRIBE & SPEAK FACE ─────────────────────────────────────────
// Maps eye+mouth emotion combos → spoken sentence
// Only eyes and mouth matter for the emotion read-out.
const emotionPhrases = {
  // eye_emotion → mouth_emotion → phrase
  'שמח':    { 'שמח':'איזה פרצוף שָׂמֵחַ!', 'מאושר':'פרצוף שָׂמֵחַ ומאושר!', 'ניטרלי':'פרצוף קצת שָׂמֵחַ.', 'עצוב':'פרצוף מבולבל — עיניים שמחות אבל פה עצוב. יצא פרצוף מוזר!', 'כועס':'פרצוף מוזר — עיניים שמחות אבל פה כועס!', 'מופתע':'פרצוף שָׂמֵחַ ומופתע!', 'שובב':'פרצוף שָׂמֵחַ ושובב!', 'מאושר':'פרצוף שָׂמֵחַ מאוד!' },

  'כועס':   { 'כועס':'פרצוף כועס מאוד!', 'שמח':'פרצוף מוזר — עיניים כועסות אבל פה שָׂמֵחַ!', 'מאושר':'יצא פרצוף מוזר — עיניים כועסות עם חיוך ענק!', 'עצוב':'פרצוף כועס ועצוב.', 'ניטרלי':'פרצוף כועס.', 'מופתע':'פרצוף כועס ומופתע!', 'שובב':'פרצוף כועס עם לשון — יצא מוזר!' },
  'מופתע':  { 'מופתע':'וואו, פרצוף מופתע!', 'שמח':'פרצוף מופתע ושָׂמֵחַ!', 'עצוב':'פרצוף מופתע ועצוב.', 'כועס':'פרצוף מופתע וכועס.', 'ניטרלי':'פרצוף קצת מופתע.', 'שובב':'פרצוף מופתע ושובב!' },
  'שובב':   { 'שמח':'פרצוף שובב וצוחק!', 'שובב':'פרצוף שובב מאוד!', 'מאושר':'פרצוף שובב ומאושר!', 'ניטרלי':'פרצוף קצת שובב.', 'עצוב':'יצא פרצוף מוזר — עין עצומה אבל פה עצוב!', 'כועס':'פרצוף מוזר — עין עצומה אבל כועס!' },
  'ישנוני': { 'ניטרלי':'פרצוף ישנוני.', 'שמח':'פרצוף ישנוני אבל מחייך.', 'עצוב':'פרצוף עייף ועצוב.', 'כועס':'פרצוף עייף אבל כועס — יצא מוזר!', 'מופתע':'פרצוף מופתע שנשאר ישנוני — יצא מוזר!', 'שובב':'פרצוף ישנוני עם לשון בחוץ — מוזר!' },
  'מתלהב':  { 'שמח':'פרצוף מתלהב ושמח!', 'מאושר':'פרצוף מתלהב ומאושר!', 'מופתע':'פרצוף מתלהב ומופתע!', 'ניטרלי':'פרצוף מתלהב.', 'עצוב':'יצא פרצוף מוזר — עיני כוכבים אבל פה עצוב!', 'כועס':'יצא פרצוף מוזר — עיני כוכבים אבל כועס!' },
  'ניטרלי': { 'ניטרלי':'פרצוף ניטרלי ורגוע.', 'שמח':'פרצוף עם חיוך.', 'עצוב':'פרצוף קצת עצוב.', 'כועס':'פרצוף קצת כועס.', 'מופתע':'פרצוף קצת מופתע.', 'שובב':'פרצוף קצת שובב.', 'מאושר':'פרצוף שמח!' },
};

const fallbackPhrases = [
  'יצא פרצוף מוזר!',
  'מה הפרצוף הזה? יצא מוזר לגמרי!',
  'פרצוף מוזר ומיוחד!',
];

function buildFaceDescription() {
  const eyeId   = state.eyes;
  const mouthId = state.mouth;

  // need at least one of the two
  if (!eyeId && !mouthId) return null;

  const eyeEmotion   = eyeId   ? parts.eyes?.find(i=>i.id===eyeId)?.emotion   : null;
  const mouthEmotion = mouthId ? parts.mouth?.find(i=>i.id===mouthId)?.emotion : null;

  // both present → look up combo
  if (eyeEmotion && mouthEmotion) {
    const row = emotionPhrases[eyeEmotion];
    if (row?.[mouthEmotion]) return row[mouthEmotion];
    // combo not in table → weird
    return fallbackPhrases[Math.floor(Math.random()*fallbackPhrases.length)];
  }

  // only one present
  const solo = eyeEmotion || mouthEmotion;
  const soloMap = { שמח:'פרצוף שָׂמֵחַ!', עצוב:'פרצוף עצוב.', כועס:'פרצוף כועס!', מופתע:'פרצוף מופתע!', שובב:'פרצוף שובב!', ישנוני:'פרצוף ישנוני.', מתלהב:'פרצוף מתלהב!', ניטרלי:'פרצוף ניטרלי.', מאושר:'פרצוף מאושר!', עדין:'פרצוף עדין.' };
  return soloMap[solo] || 'פרצוף מיוחד!';
}

let currentUtterance = null;

function speakFace() {
  if (!('speechSynthesis' in window)) {
    alert('הדפדפן שלך לא תומך בהקראה.');
    return;
  }

  const btn = document.getElementById('btnSpeak');

  // If already speaking — stop
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    btn.querySelector('.speak-icon').textContent = '🔊';
    return;
  }

  const text = buildFaceDescription();
  if (!text) return;

  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'he-IL';
  currentUtterance.rate = 0.92;
  currentUtterance.pitch = 1.05;

  // Try to pick a Hebrew voice
  const voices = window.speechSynthesis.getVoices();
  const heVoice = voices.find(v => v.lang.startsWith('he')) || voices.find(v => v.lang.startsWith('iw'));
  if (heVoice) currentUtterance.voice = heVoice;

  currentUtterance.onstart = () => {
    btn.classList.add('speaking');
    btn.querySelector('.speak-icon').textContent = '⏹';
  };
  currentUtterance.onend = currentUtterance.onerror = () => {
    btn.classList.remove('speaking');
    btn.querySelector('.speak-icon').textContent = '🔊';
  };

  window.speechSynthesis.speak(currentUtterance);
}

function selectCategory(cat) {
  currentCat=cat;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+cat).classList.add('active');
  document.getElementById('optionsTitle').textContent=catMeta[cat].label;
  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  parts[cat].forEach(item=>{
    const card=document.createElement('div');
    // accessories: each item selected based on its slot state
    const isSelected = cat==='accessories'
      ? state[item.slot]===item.id
      : state[cat]===item.id;
    card.className='option-card'+(isSelected?' selected':'');
    card.dataset.cat=cat; card.dataset.id=item.id;
    card.addEventListener('click',()=>{
      applyPart(cat,item.id);
      if(cat!=='accessories'){
        grid.querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
      }
    });
    card.addEventListener('mousedown',e=>{ if(e.button===0) startDrag(e,cat,item); });
    const pv=document.createElement('div'); pv.className='option-preview'; pv.innerHTML=item.preview||'';
    // group label for accessories
    const lb=document.createElement('div'); lb.className='option-label';
    if(cat==='accessories'){
      const slotLabel = {hat:'כובע',glasses:'משקפיים',mustache:'שפם'}[item.slot]||'';
      lb.innerHTML=`<span style="font-size:0.65rem;opacity:0.7">${slotLabel}</span><br>${item.label}`;
    } else {
      lb.textContent=item.label+(item.emotion?` (${item.emotion})`:'');
    }
    card.appendChild(pv); card.appendChild(lb); grid.appendChild(card);
  });
}

function startDrag(e,cat,item){
  dragging={cat,item};
  ghostEl=document.createElement('div'); ghostEl.className='drag-ghost'; ghostEl.innerHTML=item.preview||'';
  document.body.appendChild(ghostEl); moveGhost(e.clientX,e.clientY);
  document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp); e.preventDefault();
}
function moveGhost(x,y){ if(ghostEl){ ghostEl.style.left=x+'px'; ghostEl.style.top=y+'px'; } }
function overFace(x,y){ const r=document.getElementById('faceContainer').getBoundingClientRect(); return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom; }
function onMove(e){ moveGhost(e.clientX,e.clientY); document.getElementById('faceContainer').classList.toggle('drag-over',overFace(e.clientX,e.clientY)); }
function onUp(e){
  document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp);
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  document.getElementById('faceContainer').classList.remove('drag-over');
  if(!dragging) return;
  if(overFace(e.clientX,e.clientY)){
    const {cat,item}=dragging; applyPart(cat,item.id);
    if(cat!=='accessories'){
      document.querySelectorAll('.option-card').forEach(c=>c.classList.toggle('selected',c.dataset.id===item.id&&c.dataset.cat===cat));
    }
    const gId=catMeta[cat].gId;
    if(gId){ const g=document.getElementById(gId); g.style.transition='transform 0.36s cubic-bezier(0.34,1.9,0.64,1)'; g.style.transform='scale(1.18)'; setTimeout(()=>{ g.style.transform='scale(1)'; },380); }
  }
  dragging=null;
}

function resetFace(){
  if (window.speechSynthesis?.speaking) window.speechSynthesis.cancel();
  const btn = document.getElementById('btnSpeak');
  btn.classList.remove('speaking');
  btn.querySelector('.speak-icon').textContent = '🔊';
  btn.disabled = true;
  Object.keys(state).forEach(k=>state[k]=null);
  ['gEyebrows','gEyes','gNose','gMouth','gEarLeft','gEarRight','gGlasses','gMustache','gHat'].forEach(id=>{ document.getElementById(id).innerHTML=''; });
  document.getElementById('emptyHints').style.opacity='1';
  document.getElementById('emotionTag').textContent='🙂 גרור פריטים לפנים!';
  selectCategory(currentCat);
}

window.onload=()=>selectCategory('eyes');
